
<div class="login-container d-flex justify-content-center align-items-center vh-100">

  <div class="login-card p-4">
    <div class="text-center mb-4">
      <h4 class="fw-bold">Login</h4>
    </div>
    <form #loginForm="ngForm" (ngSubmit)="login()">
     
      <!-- Username -->
      <div class="mb-3">
        <label for="username" class="form-label fw-semibold">Username:</label>
        <input
          type="text"
          id="username"
          name="username"
          class="form-control"
          [(ngModel)]="loginData.username"
          #usernameInput="ngModel"
          required
          placeholder="Enter your username"
        />
        <div *ngIf="usernameInput.invalid && usernameInput.touched" class="text-danger mt-1">
          <small *ngIf="usernameInput.errors['required']">Username is required</small>
        </div>
      </div>
 
      <!-- Password -->
      <div class="mb-3">
        <label for="password" class="form-label fw-semibold">Password:</label>
        <input
          type="password"
          id="password"
          name="password"
          class="form-control"
          [(ngModel)]="loginData.password"
          #passwordInput="ngModel"
          required
          placeholder="Enter your password"
        />
        <div *ngIf="passwordInput.invalid && passwordInput.touched" class="text-danger mt-1">
          <small *ngIf="passwordInput.errors['required']">Password is required</small>
        </div>
      </div>
 
      <!-- Submit Button -->
      <button type="submit" class="btn btn-dark w-100 fw-bold" [disabled]="loginForm.invalid">
        Login
      </button>
    </form>
 
    <!-- Register Link -->
    <div class="mt-3 text-center">
      <p>
        Don't have an account?
        <a routerLink="/register" class="link-dark fw-semibold">Register here</a>
      </p>
    </div>
  </div>
</div>
