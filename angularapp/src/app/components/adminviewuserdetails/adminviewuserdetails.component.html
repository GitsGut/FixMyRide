<div class="container mt-5 p-4 bg-white text-dark border border-dark rounded shadow">
  <h4 class="mb-4 fw-bold text-center">Customer List</h4>

   <div *ngIf="users.length === 0" class="text-center text-muted">
    No Customers available.
  </div> 
  <div  class="table-responsive">
    <table class="table table-bordered border-dark table-striped align-middle text-center">
      <thead class="table-dark">
        <th>S.NO</th>
        <th>Customer Name</th>
        <th>Email</th>
        <th>Role</th>
        <th>Mobile Number</th>
        <th>Actions</th>
    </thead>
    <tbody>
      <tr *ngFor="let user of users; let i = index" class="animate__animated animate__fadeIn"     >
        <td>{{ i + 1 }}</td>
        <td>{{ user.username }}</td>
        <td>{{ user.email }}</td>
        <td>{{ user.userRole }}</td>
        <td>{{ user.mobileNumber }}</td>
        <td>
          <button  class="btn btn-outline-danger btn-sm" (click)="deleteUser(user.userId)">Delete</button>
        </td>
      </tr>
    </tbody>
  </table>
