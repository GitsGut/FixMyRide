<div class="dashboard-container">
    <h2>Super Admin Dashboard</h2>
    <table>
      <thead>
        <tr>
          <th>Username</th>
          <th>Email</th>
          <th>Mobile</th>
          <th>Role</th>
          <th>Status</th>
          <th>Action</th>
        </tr>
      </thead>
      <tbody>
        <tr *ngFor="let user of users">
          <td>{{ user.username }}</td>
          <td>{{ user.email }}</td>
          <td>{{ user.mobileNumber }}</td>
          <td>{{ user.userRole }}</td>
       
<td>
    <span [class.approved]="user.approved" [class.disapproved]="!user.approved">
      {{ user.approved ? 'Approved' : 'Disapproved' }}
    </span>
  </td>
  
          <td>
            <button (click)="toggleApproval(user)">
              {{ user.approved ? 'Disapprove' : 'Approve' }}
            </button>
          </td>
        </tr>
      </tbody>
    </table>
  </div>
